<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil Peserta Magang — Museum Penerangan</title>
    <meta name="description" content="Halaman kenangan peserta magang Museum Penerangan." />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="index.html">Museum Penerangan</a>
        <nav class="site-nav" aria-label="Navigasi utama">
          <a href="index.html">Beranda</a>
          <a href="gallery.html">Galeri</a>
          <a href="interns.html">Direktori</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <p class="detail-back">
            <a href="interns.html">&larr; Kembali ke direktori</a>
          </p>

          <div id="detail-error" class="error-state" hidden></div>
          <article id="detail-content" hidden>
            <header class="detail-hero">
              <div class="detail-hero__photo">
                <img id="detail-photo" src="" alt="" width="280" height="350" />
              </div>
              <h1 id="detail-name"></h1>
              <p id="detail-division" class="detail-meta"></p>
              <p><span id="detail-year" class="detail-year"></span></p>
            </header>
            <blockquote id="detail-quote" class="quote-block"></blockquote>
            <div id="detail-playful" class="detail-playful" hidden>
              <p class="detail-playful__nick" id="detail-nickname"></p>
              <p class="detail-playful__fact" id="detail-funfact"></p>
            </div>
            <div id="detail-gallery" class="detail-gallery" hidden>
              <h2>Galeri pribadi</h2>
              <ul id="detail-gallery-grid" class="photo-grid"></ul>
            </div>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p class="site-footer__title"><strong>Museum Penerangan</strong> — Arsip Kenangan Magang</p>
        <p class="site-footer__meta">Situs statis · data dari berkas JSON</p>
        <p id="footer-fun-fact" class="site-footer__fun-fact" hidden></p>
      </div>
    </footer>

    <div
      id="photo-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-caption"
      hidden
    >
      <div class="modal__dialog">
        <button type="button" class="modal__close" aria-label="Tutup">&times;</button>
        <div class="modal__img-wrap">
          <img id="modal-image" src="" alt="" />
        </div>
        <p id="modal-caption" class="modal__caption"></p>
      </div>
    </div>

    <div class="music-dock" id="music-dock" role="region" aria-label="Pemutar musik kenangan">
      <p class="music-dock__track">
        <span class="music-dock__label">Lagu kenangan</span>
        <span class="music-dock__title">Bernadya — Kita Buat Menyenangkan</span>
      </p>
      <p id="music-dock-error" class="music-dock__err" role="alert" hidden></p>
      <button
        type="button"
        class="music-dock__btn"
        id="music-dock-toggle"
        aria-pressed="false"
        aria-label="Putar lagu kenangan"
      >
        <span class="music-dock__btn-icon" aria-hidden="true">▶</span>
        <span class="music-dock__btn-text">Putar</span>
      </button>
    </div>
    <audio id="site-audio" preload="auto" playsinline>
      <source src="audio/lagu-kenangan.mp3" type="audio/mpeg" />
    </audio>

    <script type="module" src="js/intern-detail.js"></script>
    <script type="module" src="js/fun-fact-footer.js"></script>
    <script type="module" src="js/site-audio.js"></script>
  </body>
</html>
